<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIDA Drink Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="status-container">
            <div id="status-light" class="light light-red"></div>
            <div class="totals">
                <span id="total-amount">0,00 €</span>
                <small>Ziel: 26,67 €</small>
            </div>
        </div>
        <h1>Drink Tracker</h1>
    </header>

    <main>
        <section class="favorites">
            <h2>Favoriten</h2>
            <div id="fav-grid" class="grid">
                </div>
        </section>

        <section class="drink-list-container">
            <h2>Alle Getränke</h2>
            <ul id="drink-list" class="list">
                </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
